name: CI -- Mood Tracker

# Déclencheurs : le pipeline s'exécute lors d'un push ou d'une pull request
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # 1. Vérification de la qualité du code (Linting et Formatage)
  quality:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # Récupère le code sur le serveur
      - uses: actions/setup-node@v4 # Installe Node.js
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci # Installe proprement les dépendances
      - run: npm run lint # Vérifie les erreurs de code
      - run: npm run format:check # Vérifie le formatage Prettier

  # 2. Exécution des tests unitaires (s'exécute uniquement si 'quality' réussit)
  tests:
    name: Tests unitaires
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm test # Lance la suite de tests

  # 3. Compilation de l'application Next.js (s'exécute uniquement si 'tests' réussit)
  build:
    name: Build Next.js
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run build # Compile le projet pour la production
