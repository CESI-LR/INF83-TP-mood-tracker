name: CI -- Mood Tracker

# Déclencheurs : le pipeline s'exécute lors d'un push ou d'une pull request
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # 1. Vérification de la qualité du code (Linting et Formatage)
  quality:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # Récupère le code sur le serveur
      - uses: actions/setup-node@v4 # Installe Node.js
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci # Installe proprement les dépendances
      - run: npm run lint # Vérifie les erreurs de code
      - run: npm run format:check # Vérifie le formatage Prettier

  # 2. Exécution des tests unitaires (s'exécute uniquement si 'quality' réussit)
  tests:
    name: Tests unitaires
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm test # Lance la suite de tests

  # 3. Compilation de l'application Next.js (s'exécute uniquement si 'tests' réussit)
  build:
    name: Build Next.js
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run build # Compile le projet pour la production

  # 4. Fusion automatique de la Pull Request (s'exécute uniquement si 'build' réussit)
  auto-merge:
    name: Auto-Merge vers branch de destination
    runs-on: ubuntu-latest
    # Ce job attend obligatoirement que la compilation (build) se termine avec succès
    needs: build
    # On exécute ce job UNIQUEMENT s'il s'agit d'une Pull Request visant la branche develop
    if: github.event_name == 'pull_request' && github.base_ref == 'develop'
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Utilisation des outils de ligne de commande GitHub pour fusionner la PR courante
      - name: Automatically merge the Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Donne l'autorisation d'agir sur le dépôt
        run: |
          gh pr merge ${{ github.event.pull_request.number }} --merge --auto --delete-branch

  # 5. Gestion des versions et création de la Release (s'exécute uniquement si 'build' réussit)
  release:
    name: Auto Semantic Release
    runs-on: ubuntu-latest
    needs: build
    # On exécute ce job UNIQUEMENT sur la branche main lors d'un push final
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write # Indispensable pour créer les tags et écrire le CHANGELOG.md
      issues: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Télécharge tout l'historique pour permettre l'analyse des commits

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Exécution de Semantic Release en lui fournissant le jeton natif de GitHub
      - name: Run Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
